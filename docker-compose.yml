version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    container_name: nac_postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - type: bind
        source: ./postgres/init.sql
        target: /docker-entrypoint-initdb.d/init.sql
        read_only: true
    networks:
      - radius-net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: nac_redis
    volumes:
      - redis_data:/data
    networks:
      - radius-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: nac_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - radius-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
        test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
        interval: 15s
        timeout: 5s
        retries: 5

  freeradius:
    image: freeradius/freeradius-server:latest-3.2
    container_name: nac_freeradius
    env_file:
      - .env
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius/mods-enabled:/etc/freeradius/mods-enabled
      - ./freeradius/sites-enabled:/etc/freeradius/sites-enabled
      - ./freeradius/clients.conf:/etc/freeradius/clients.conf
    networks:
      - radius-net
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "radtest healthcheck testing localhost 0 ${RADIUS_SECRET} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  radius-net:
    driver: bridge